<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuclidCam | Geometric Precision</title>
  <meta name="description" content="EuclidCam: Mathematical image enhancement.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
</head>

<body class="euclid-theme">
  <div id="boot-screen" class="boot-screen">
    <div class="boot-inner">
      <img src="assets/euclid_construction.gif" alt="Euclid Construction" class="boot-gif">
      <p class="boot-text">INITIALIZING GEOMETRIC ENGINE...</p>
    </div>
  </div>

  <div id="main-grid" class="main-grid hidden">
    <div class="grid-item gallery" id="grid-gallery">
      <div class="item-inner">
        <span class="item-id">01</span>
        <h2>Gallery</h2>
        <p>Media Library / Enhanced Captures</p>
        <div class="item-action">OPEN</div>
      </div>
    </div>
    <div class="grid-item github" id="grid-github">
      <div class="item-inner">
        <span class="item-id">02</span>
        <h2>Github</h2>
        <p>Source / Contribution / PiDigiCam</p>
        <div class="item-action">VIEW</div>
      </div>
    </div>
    <div class="grid-item sdk" id="grid-sdk">
      <div class="item-inner">
        <span class="item-id">03</span>
        <h2>SDK</h2>
        <p>Architecture / Optimization / C-Engine</p>
        <div class="item-action">DOCS</div>
      </div>
    </div>
    <div class="grid-item design" id="grid-design">
      <div class="item-inner">
        <span class="item-id">04</span>
        <h2>Design</h2>
        <p>Golden Ratio / Phi / Aesthetics</p>
        <div class="item-action">SPEC</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
