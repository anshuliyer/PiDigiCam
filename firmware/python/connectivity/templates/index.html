<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuclidCam - Camera Roll</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="none" stroke="#E0B0FF" stroke-width="2"/>
                <circle cx="20" cy="20" r="8" fill="#E0B0FF"/>
            </svg>
            <h1>EuclidCam</h1>
        </div>
        <p class="subtitle">Camera roll</p>
    </header>

    <main class="gallery">
        {% if images %}
            {% for image in images %}
            <div class="card">
                <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
                <div class="actions">
                    <span class="filename">{{ image }}</span>
                    <div class="buttons">
                        <a href="{{ url_for('download_image', filename=image) }}" class="btn download">Download</a>
                        <form action="{{ url_for('delete_image', filename=image) }}" method="POST" onsubmit="return confirm('Delete this image?');">
                            <button type="submit" class="btn delete">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty">
                <p>No images captured yet.</p>
            </div>
        {% endif %}
    </main>
</body>
</html>
